name: Build
on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable

      - name: Build
        run: cargo b -r -p mslicer -p slicer

      - name: Package
        run: |
          mkdir out
          if [ "$RUNNER_OS" == "Linux" ]; then
            cp target/release/mslicer out
            cp target/release/slicer out
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cp target/release/mslicer.exe out
            cp target/release/slicer.exe out
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cp -r dist/mslicer.app out
            mkdir out/mslicer.app/Contents/MacOS
            cp target/release/mslicer out/mslicer.app/Contents/MacOS
            cp target/release/slicer out
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mslicer-${{ matrix.os }}
          path: out/*
